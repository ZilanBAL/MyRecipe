name: Java CI

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/checkout@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

#      - name: Run tests
#        run: |
#          chmod +x mvnw
#          ./mvnw test

      - name: Package application
        run:  |
          chmod +x mvnw
          ./mvnw clean package